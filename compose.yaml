services:
  royaltest:
    image: ghcr.io/szaionz/royaltest:nightly
    build: .
    ports:
      - '${ROYALTEST_PORT:-5000}:5000'
    environment:
      ROYALTEST_SECRET_KEY: ${ROYALTEST_SECRET_KEY:-royaltest-dev-secret}
      ROYALTEST_HOST: 0.0.0.0
      ROYALTEST_PORT: 5000
      ROYALTEST_DEBUG: ${ROYALTEST_DEBUG:-0}
      ROYALTEST_DATABASE_URL: ${ROYALTEST_DATABASE_URL:-postgresql+psycopg://royaltest@postgres:5432/royaltest}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: royaltest
      POSTGRES_USER: royaltest
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U royaltest -d royaltest']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
